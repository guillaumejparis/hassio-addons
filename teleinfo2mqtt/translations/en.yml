---

configuration:
  EMIT_INTERVAL:
    name: Interval in seconds between 2 MQTT emissions
    description: Interval in seconds between 2 MQTT emissions (0 = All frames are sent, 10 by default)

  HASS_DISCOVERY_PREFIX:
    name: Topic prefix for Home-Assistant Discovery
    description: Topic prefix for Home-Assistant Discovery (homeassistant by default)

  LOG_LEVEL:
    name: Log level (DEBUG, INFO, ERROR)
    description: Log level (DEBUG, INFO, ERROR, INFO by default)

  MQTT_BASE_TOPIC:
    name: MQTT Base topic
    description: MQTT Base topic (teleinfo by default)

  MQTT_URL:
    name: MQTT Broker connection URL
    description: MQTT Broker connection URL (mqtt://core-mosquitto:1883 by default)

  MQTT_USER:
    name: MQTT user (optional)
    description: MQTT user (only if authentication is enabled on the mqtt broker)

  MQTT_PASSWORD:
    name: MQTT password (optional)
    description: MQTT password (only if authentication is enabled on the mqtt broker)

  SERIAL:
    name: Serial Port location
    description: Serial Port location (/dev/ttyACM0 by default)

  TIC_MODE:
    name: TIC mode
    description: TIC mode - standard (Linky 9600 baud) or history (legacy 1200 baud)

  TEMPO_ENABLED:
    name: Enable Tempo tariff
    description: Enable EDF Tempo tariff colour fetching (false by default)
